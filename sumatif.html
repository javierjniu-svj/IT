<html>
<head>
  <title>Form Pendaftaran</title>
  <link rel= "stylesheet" style ="text/css" href="sumatif.css">
</head>

<body>

<div class="container">
  <h1>Form Pendaftaran</h1>

  <h3>Nama:</h3><input type="text" id="nama" class="text">
  
  <h3>Kelas:</h3><input type="text" id="kelas" class="text">
  
  <div class="group">
    <h3>Umur:</h3>
    <label>10-12 tahun<input type="checkbox" name="umur" value="10-12 tahun"></label>
    <label>13-15 tahun<input type="checkbox" name="umur" value="13-15 tahun"></label>
    <label>16-17 tahun<input type="checkbox" name="umur" value="16-17 tahun"></label>
  </div>

  <div class="group">
    <h3>Jenis Kelamin:</h3>
    <label>Laki - laki <input type="checkbox" name="jk" value="Laki - laki"></label>
    <label>Perempuan<input type="checkbox" name="jk" value="Perempuan"></label>
  </div>

  <div class="group">
    <h3>Tingkatan:</h3>
    <label>SD <input type="checkbox" name="tingkatan" value="SD"></label>
    <label>SMP<input type="checkbox" name="tingkatan" value="SMP"></label>
    <label>SMA<input type="checkbox" name="tingkatan" value="SMA"></label>
  </div>

  <div class="output" id="output"></div>
</div>

<div class="tombol">
  <button class="btn ok" onclick="tampilkan()">OK</button>
  <button class="btn clear" onclick="bersihkan()">CLEAR</button>
</div>

<script src="sumatif.js"></script>
</body>
</html>
